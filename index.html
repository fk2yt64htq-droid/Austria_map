<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Austria Map</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
html, body { margin:0; padding:0; height:100%; }
#map { height:100vh; width:100vw; }
.btn { width: 100%; padding:10px; margin-top:5px; border:none; border-radius:6px; color:#fff; font-weight:bold; cursor:pointer; }
.leaflet-popup-content { text-align:center; color:#000 !important; }

.top-permanent-box {
position: absolute;
top: 10px;
left: 10px;
z-index: 9999;
background: rgba(255, 255, 255, 0.95);
width: 240px;
border-radius: 8px;
box-shadow: 0 4px 12px rgba(0,0,0,.3);
padding: 12px;
font-family: Arial, sans-serif;
border: 1px solid #ddd;
}
.top-permanent-box h3 { 
margin: 0 0 8px 0; 
font-size: 14px; 
text-align: center; 
color: #222; 
border-bottom: 2px solid #136AEC;
padding-bottom: 4px;
}
.top-item { 
display: flex; 
justify-content: space-between; 
padding: 5px 0; 
border-bottom: 1px solid #eee; 
font-size: 13px; 
}
.top-item:last-child { border: none; }

/* Блок елементів керування у верхньому правому кутку */
.right-control-box {
position: absolute;
top: 10px;
right: 10px;
z-index: 9999;
display: flex;
align-items: center;
gap: 6px;
}

/* Кнопка зворотного зв'язку (лампочка) */
.feedback-circle-btn {
background: #ff9800;
color: white;
border: none;
width: 34px;
height: 34px;
border-radius: 6px;
font-size: 16px;
font-weight: bold;
cursor: pointer;
box-shadow: 0 2px 6px rgba(0,0,0,.3);
display: flex;
align-items: center;
justify-content: center;
transition: background 0.2s, transform 0.1s;
padding: 0;
}
.feedback-circle-btn:active {
transform: scale(0.9);
}

/* Контейнер вибору мови */
.langBox {
background: white;
padding: 5px;
border-radius: 6px;
box-shadow: 0 2px 6px rgba(0,0,0,.3);
height: 24px;
display: flex;
align-items: center;
}
.langBox select {
border: none;
outline: none;
background: transparent;
font-size: 16px;
cursor: pointer;
}

/* Модальне вікно */
.modal-overlay {
position: fixed;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: rgba(0,0,0,0.5);
z-index: 10000;
display: none;
align-items: center;
justify-content: center;
}
.modal-box {
background: white;
padding: 20px;
border-radius: 12px;
width: 90%;
max-width: 340px;
box-shadow: 0 4px 15px rgba(0,0,0,0.3);
box-sizing: border-box;
font-family: Arial, sans-serif;
}
.modal-box h3 {
margin: 0 0 12px 0;
color: #333;
font-size: 16px;
text-align: center;
}
.modal-box textarea {
width: 100%;
height: 100px;
border: 1px solid #ccc;
border-radius: 6px;
padding: 8px;
resize: none;
box-sizing: border-box;
font-size: 14px;
outline: none;
}
.modal-box textarea:focus {
border-color: #ff9800;
}
.modal-actions {
display: flex;
justify-content: flex-end;
gap: 10px;
margin-top: 12px;
}
.btn-modal {
padding: 8px 14px;
border: none;
border-radius: 6px;
cursor: pointer;
font-weight: bold;
font-size: 14px;
}
.btn-cancel { background: #eee; color: #333; }
.btn-submit { background: #ff9800; color: white; }

@media (max-width: 400px) {
  .top-permanent-box { width: 190px; padding: 8px; font-size: 11px; }
  .top-permanent-box h3 { font-size: 12px; }
  .top-item { font-size: 11px; padding: 3px 0; }
  .feedback-circle-btn { width: 30px; height: 30px; font-size: 14px; }
}
</style>
</head>
<body>

<div id="map"></div>

<div class="top-permanent-box">
    <h3 id="topTitle">🏆 ТОП-5 active drivers</h3>
    <div id="topList">Завантаження рейтингу...</div>
</div>

<div class="right-control-box">
    <button class="feedback-circle-btn" onclick="openFeedbackModal()">💡</button>
    <div class="langBox">
        <select id="langSelect">
            <option value="uk">🇺🇦</option>
            <option value="pl">🇵🇱</option>
            <option value="sk">🇸🇰</option>
            <option value="en">🇬🇧</option>
            <option value="be">🇧🇾</option>
        </select>
    </div>
</div>

<div class="modal-overlay" id="feedbackModal">
    <div class="modal-box">
        <h3 id="modalTitle">Запропонувати ідею або КПП</h3>
        <textarea id="feedbackText" placeholder="Напишіть вашу пропозицію тут..."></textarea>
        <div class="modal-actions">
            <button class="btn-modal btn-cancel" onclick="closeFeedbackModal()">Скасувати</button>
            <button class="btn-modal btn-submit" onclick="submitFeedback()">Надіслати</button>
        </div>
    </div>
</div>

<script>
const tg = window.Telegram ? window.Telegram.WebApp : null;
if (tg) {
    tg.ready();
    tg.expand();
}

  const tgLang = tg?.initDataUnsafe?.user?.language_code;
  if(tgLang){
    if(tgLang.startsWith("pl")) lang="pl";
    else if(tgLang.startsWith("sk")) lang="sk";
    else if(tgLang.startsWith("be")) lang="be";
    else if(tgLang.startsWith("uk")) lang="uk";
    else lang="en";
  }else{
    lang="uk";
  }
}
document.getElementById("langSelect").value = lang;
document.getElementById("langSelect").addEventListener("change",(e)=>{
  lang = e.target.value;
  localStorage.setItem("lang",lang);
  updateLabels();
  loadStats();
});

  sk:{ clean:"ČISTÉ", control:"KONTROLA", total:"Spolu", was_control:"Bola KONTROLA", was_clean:"Bolo ČISTÉ", active: "Aktívne:", feedback_prompt: "Navrhnúť nápad alebo bod", placeholder: "Sem napíšte svoj návrh...", cancel: "Zrušiť", send: "Odoslať", empty_err: "Prosím, zadajte text návrhu!", thanks: "Ďakujeme! Váš návrh bol odoslaný." },
  en:{ clean:"CLEAR", control:"CONTROL", total:"Total", was_control:"Was CONTROL", was_clean:"Was CLEAR", active: "Active:", feedback_prompt: "Suggest an idea or checkpoint", placeholder: "Write your suggestion here...", cancel: "Cancel", send: "Send", empty_err: "Please enter suggestion text!", thanks: "Thank you! Your suggestion has been sent." },
  be:{ clean:"ЧЫСТА", control:"КАНТРОЛЬ", total:"Усяго", was_control:"Быў КАНТРОЛЬ", was_clean:"Было ЧЫСТА", active: "Актыўна:", feedback_prompt: "Прапанаваць ідэю ці КПП", placeholder: "Напішыце вашу прапанову тут...", cancel: "Касаваць", send: "Адправіць", empty_err: "Калі ласка, увядзіце тэкст прапановы!", thanks: "Дякуй! Ваша прапанова адпраўлена." }
};
function t(k){ return i18n[lang][k]; }

function updateLabels() {
    document.getElementById("modalTitle").innerText = t("feedback_prompt");
    document.getElementById("feedbackText").placeholder = t("placeholder");
    document.getElementById("feedbackModal").querySelector(".btn
