<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Austria Map</title>

<link rel="stylesheet" href="https://jsdelivr.net"/>
<script src="https://jsdelivr.net"></script>
<script src="https://telegram.org"></script>

<style>
html, body { margin:0; padding:0; height:100%; }
#map { height:100vh; width:100vw; }
.btn { width:100%; padding:10px; margin-top:5px; border:none; border-radius:6px; color:#fff; font-weight:bold; cursor:pointer; }
.leaflet-popup-content { text-align:center; color:#000 !important; }
</style>
</head>
<body>

<div id="map"></div>

<script>
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

const API_URL = "https://onrender.com";

const dots = [
{"id":1,"n":"Hörbranz A14","lt":47.5446,"ln":9.7407},
{"id":2,"n":"Nuziders A14","lt":47.1731,"ln":9.7737},
{"id":3,"n":"Rabfeld A12","lt":47.4574,"ln":11.9196},
{"id":4,"n":"Kundl A12","lt":47.4734,"ln":11.9693},
{"id":5,"n":"Wels A8","lt":48.1790,"ln":13.8623},
{"id":6,"n":"Wolfsbach A1 (1)","lt":48.1120,"ln":14.6761},
{"id":7,"n":"Wolfsbach A1 (2)","lt":48.1123,"ln":14.6786},
{"id":8,"n":"Mistelbach A5","lt":48.5389,"ln":16.6259},
{"id":9,"n":"Bruck an der Leitha A4","lt":48.0431,"ln":16.7791},
{"id":10,"n":"Pernau A2","lt":47.0900,"ln":15.8511},
{"id":11,"n":"Strass in Steiermark A9","lt":46.7317,"ln":15.6436},
{"id":12,"n":"Hainburg A2","lt":46.6845,"ln":14.6591},
{"id":13,"n":"Arnoldstein A2","lt":46.5492,"ln":13.7042},
{"id":14,"n":"Grassbrunn A99","lt":48.0894396,"ln":11.7446506},
{"id":15,"n":"Eberstalzell A1","lt":48.038939,"ln":13.988940},
{"id":16,"n":"Toplitsch/Sud A10","lt":46.654471,"ln":13.739964},
{"id":17,"n":"Kuchl A10","lt":47.649664,"ln":13.136348},
{"id":18,"n":"San Vittore A13","lt":46.2313847,"ln":9.1017162},
{"id":19,"n":"Holztraume A13","lt":46.7635930,"ln":9.4191040},
// Дві постійно червоні точки (замініть координати на потрібні)
{"id":100,"n":"Контроль 1","lt":48.2082,"ln":16.3738, "locked": true},
{"id":101,"n":"Контроль 2","lt":47.0707,"ln":15.4395, "locked": true}
];

let map = L.map("map").setView([47.5162, 14.5501], 7);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

// Логіка СИНЬОЇ КРАПКИ (Геопозиція)
let myDot = null;
let myAccuracy = null;

function setMyLocation(lat, lon, acc = 150) {
    if (myDot) {
        myDot.setLatLng([lat, lon]);
        myAccuracy.setLatLng([lat, lon]);
        myAccuracy.setRadius(acc);
    } else {
        myAccuracy = L.circle([lat, lon], { radius: acc, color: "#136AEC", fillColor: "#136AEC", fillOpacity: 0.15, weight: 1 }).addTo(map);
        myDot = L.circleMarker([lat, lon], { radius: 8, fillColor: "#136AEC", color: "#fff", weight: 3, opacity: 1, fillOpacity: 1 }).addTo(map);
        map.setView([lat, lon], 9);
    }
}

// Запит локації
if (navigator.geolocation) {
    navigator.geolocation.watchPosition(pos => {
        setMyLocation(pos.coords.latitude, pos.coords.longitude, pos.coords.accuracy);
    }, null, { enableHighAccuracy: true });
}

let markers = {}, stats = {};

function createPopup(dot, redP, greenP, total) {
    if (dot.locked) return `<b>${dot.n}</b><br><b style="color:red">ПОСТІЙНИЙ КОНТРОЛЬ</b>`;
    return `
    <b>${dot.n}</b><br>
    🔴 ${redP}% | 🟢 ${greenP}%<br>
    <small>Всього: ${total}</small><br>
    <button class="btn" style="background:green" onclick="sendVote(${dot.id},'green')">ЧИСТО</button>
    <button class="btn" style="background:red" onclick="sendVote(${dot.id},'red')">КОНТРОЛЬ</button>
    `;
}

async function loadStats() {
    try {
        const res = await fetch(`${API_URL}/stats`);
        stats = await res.json();
    } catch { stats = {}; }

    dots.forEach(dot => {
        const s = stats[dot.id] || { green: 0, red: 0 };
        const total = s.green + s.red;
        const redP = total ? Math.round((s.red / total) * 100) : 0;
        const greenP = total ? 100 - redP : 0;

        let color = "blue";
        if (dot.locked) {
            color = "red"; 
        } else if (total > 0) {
            if (s.red > s.green) color = "red";
            else if (s.green > s.red) color = "green";
            else color = "gold"; // ЯСКРАВО-ЖОВТИЙ
        }

        const iconConfig = new L.Icon({
            iconUrl: `https://githubusercontent.com{color}.png`,
            shadowUrl: 'https://cloudflare.com',
            iconSize: [25, 41],
            iconAnchor: [12, 41],
            popupAnchor: [1, -34],
            shadowSize: [41, 41]
        });

        if (!markers[dot.id]) {
            markers[dot.id] = L.marker([dot.lt, dot.ln], { icon: iconConfig }).addTo(map).bindPopup(createPopup(dot, redP, greenP, total));
            L.circle([dot.lt, dot.ln], { radius: 1500, color: "blue", weight: 1, fillOpacity: 0.1 }).addTo(map);
        } else {
            markers[dot.id].setIcon(iconConfig);
            markers[dot.id].setPopupContent(createPopup(dot, redP, greenP, total));
        }
    });
}

window.sendVote = async (id, status) => {
    try {
        await fetch(`${API_URL}/update`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ id, status })
        });
    } catch { }
    tg.sendData(`${status}_${id}`);
    loadStats();
};

loadStats();
setInterval(loadStats, 2000);
</script>
</body>
</html>
