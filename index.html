<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Austria Map</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { margin:0; font-family:Arial; }
        .top-box { position:absolute; top:10px; left:10px; z-index:999; background:white; padding:10px; border-radius:8px; }
        .right-menu { position:absolute; top:10px; right:10px; z-index:999; display:flex; flex-direction:column; gap:10px; }
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:9999; justify-content:center; align-items:center; }
        .modal-box { background:white; padding:20px; border-radius:12px; width:80%; }
        .ban-btn { position:fixed; bottom:20px; left:5%; width:90%; padding:15px; background:#d32f2f; color:white; border:none; border-radius:8px; font-weight:bold; z-index:999; }
    </style>
</head>
<body>
    <div id="map" style="height:100vh;"></div>
    <div class="top-box">🏆 ТОП-5 активних водіїв<div id="topList">...</div></div>
    <div class="right-menu">
        <button onclick="document.getElementById('fModal').style.display='flex'">💡</button>
    </div>
    <button class="ban-btn" onclick="submitBan()">TRAFFICBAN</button>

    <div id="fModal" class="modal">
        <div class="modal-box">
            <textarea id="fText" style="width:100%; height:80px;"></textarea>
            <button onclick="sendFeedback()">Надіслати</button>
            <button onclick="document.getElementById('fModal').style.display='none'">Закрити</button>
        </div>
    </div>

    <script>
        const API_URL = "https://austria-map.onrender.com";
        const tg = window.Telegram.WebApp;
        tg.ready();

        function sendFeedback() {
            const text = document.getElementById("fText").value;
            fetch(`${API_URL}/feedback`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({text: text, first_name: tg.initDataUnsafe.user?.first_name})
            }).then(() => { alert("Дякуємо!"); document.getElementById('fModal').style.display='none'; });
        }

        function submitBan() {
            fetch(`${API_URL}/update`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({id: 0, status: 'red', first_name: tg.initDataUnsafe.user?.first_name})
            }).then(() => alert("TRAFFICBAN активовано!"));
        }
    </script>
</body>
</html>
