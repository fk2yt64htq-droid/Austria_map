<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Austria Map</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* ... (Твої стилі залишаються без змін) ... */
        html, body { margin:0; padding:0; height:100%; }
        #map { height:100vh; width:100vw; }
        .btn { width: 100%; padding:10px; margin-top:5px; border:none; border-radius:6px; color:#fff; font-weight:bold; cursor:pointer; }
        .leaflet-popup-content { text-align:center; color:#000 !important; }
        .top-permanent-box { position: absolute; top: 10px; left: 10px; z-index: 9999; background: rgba(255, 255, 255, 0.95); width: 240px; border-radius: 8px; box-shadow: 0 4px 12px rgba(0,0,0,.3); padding: 12px; font-family: Arial, sans-serif; border: 1px solid #ddd; }
        .top-permanent-box h3 { margin: 0 0 8px 0; font-size: 14px; text-align: center; color: #222; border-bottom: 2px solid #136AEC; padding-bottom: 4px; }
        .top-item { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #eee; font-size: 13px; }
        .right-controls { position: absolute; top: 10px; right: 10px; z-index: 9999; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .feedback-btn, .donate-btn, .theme-btn { background: #ff9800; color: white; border: none; width: 36px; height: 36px; border-radius: 6px; font-size: 18px; cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,.3); display: flex; align-items: center; justify-content: center; }
        .donate-btn { background: #4caf50; }
        .theme-btn { background: #673ab7; }
        .langBox { background: white; padding: 5px; border-radius: 6px; box-shadow: 0 2px 6px rgba(0,0,0,.3); height: 24px; display: flex; align-items: center; width: 36px; justify-content: center; }
        .langBox select { border: none; outline: none; background: transparent; font-size: 16px; cursor: pointer; }
        .map-controls { position: fixed; bottom: 80px; left: 0; width: 100%; z-index: 9999; display: flex; justify-content: center; gap: 15px; padding: 10px; box-sizing: border-box; }
        .ctrl-btn { background: #ffffff; border: none; width: 50px; height: 50px; border-radius: 50%; font-size: 22px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 10000; display: none; align-items: center; justify-content: center; }
        .modal-box { background: white; padding: 20px; border-radius: 12px; width: 85%; max-width: 320px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        body.dark-theme .top-permanent-box { background: rgba(30, 30, 30, 0.95); color: #fff; border-color: #444; }
        body.dark-theme .ctrl-btn { background: #222; color: #fff; }
        body.dark-theme .modal-box { background: #222; color: #fff; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="top-permanent-box">
        <h3 id="topTitle">🏆 ТОП-5 active drivers</h3>
        <div id="topList">Завантаження рейтингу...</div>
    </div>
    <div class="right-controls">
        <div class="langBox">
            <select id="langSelect">
                <option value="uk">🇺🇦</option><option value="pl">🇵🇱</option><option value="sk">🇸🇰</option><option value="en">🇬🇧</option><option value="be">🇧🇾</option>
            </select>
        </div>
        <button class="feedback-btn" onclick="openFeedbackModal()">💡</button>
        <button class="donate-btn" onclick="showDonateModal()">☕️</button>
        <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">🌙</button>
    </div>
    <div class="map-controls">
        <button class="ctrl-btn" onclick="map.zoomOut()">➖</button>
        <button class="ctrl-btn" onclick="locateUser(true)">🎯</button>
        <button class="ctrl-btn" onclick="map.zoomIn()">➕</button>
    </div>
    <div style="position: fixed; bottom: 0; left: 0; width: 100%; z-index: 9999; padding: 10px; background: rgba(255,255,255,0.1);">
        <button onclick="sendTrafficBan()" style="width: 100%; padding: 15px; border: none; border-radius: 8px; background: #b71c1c; color: white; font-weight: bold; font-size: 16px; cursor: pointer;">TRAFFICBAN</button>
    </div>
    <div class="modal-overlay" id="feedbackModal">
        <div class="modal-box">
            <h3 id="modalTitle">Зв'язатися з підтримкою</h3>
            <textarea id="feedbackText" style="width:100%; height:90px;"></textarea>
            <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:10px;">
                <button class="btn-modal" id="btnFeedbackCancel" onclick="closeFeedbackModal()">Скасувати</button>
                <button class="btn-modal" id="btnFeedbackSubmit" onclick="submitFeedback()">Надіслати</button>
            </div>
        </div>
    </div>
    <script>
        const tg = window.Telegram ? window.Telegram.WebApp : null;
        if (tg) { tg.ready(); tg.expand(); }
        const API_URL = "https://austria-map.onrender.com";
        let lang = localStorage.getItem("lang") || "uk";

        const i18n = {
            uk: { clean:"ЧИСТО", control:"КОНТРОЛЬ", total:"Всього", active: "Активно:", top_title: "🏆 ТОП-5 active drivers", support_title: "Зв'язатися з підтримкою", cancel: "Скасувати", send: "Надіслати", close: "Закрити", ok: "Гаразд", too_far: "Ви занадто далеко ({dist} км). Радіус дії 2 км!" },
            pl: { clean:"CZYSTO", control:"KONTROLA", total:"Razem", active: "Aktywne:", top_title: "🏆 TOP-5 active drivers", support_title: "Skontaktuj się z wsparciem", cancel: "Anuluj", send: "Wyślij", close: "Zamknij", ok: "Dobrze", too_far: "Jesteś za daleko ({dist} km). Zasięg wynosi 2 km!" },
            sk: { clean:"ČISTÉ", control:"KONTROLA", total:"Spolu", active: "Aktívne:", top_title: "🏆 TOP-5 active drivers", support_title: "Kontaktovať podporu", cancel: "Zrušiť", send: "Odoslať", close: "Zatvoriť", ok: "Dobre", too_far: "Ste príliš ďaleko ({dist} km). Dosah je 2 km!" },
            en: { clean:"CLEAR", control:"CONTROL", total:"Total", active: "Active:", top_title: "🏆 TOP-5 active drivers", support_title: "Contact Support", cancel: "Cancel", send: "Send", close: "Close", ok: "OK", too_far: "You are too far ({dist} km). Range is 2 km!" },
            be: { clean:"ЧЫСТА", control:"КАНТРОЛЬ", total:"Усяго", active: "Актыўна:", top_title: "🏆 ТОП-5 active drivers", support_title: "Звязацца з падтрымкай", cancel: "Скасаваць", send: "Адправіць", close: "Зачыніць", ok: "Добра", too_far: "Вы занадта далёка ({dist} км). Радыус дзеяння 2 км!" }
        };

        function t(k) { return i18n[lang][k]; }

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return (R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))).toFixed(1);
        }

        function sendVote(id, status, pointLat, pointLng) {
            if (!navigator.geolocation) { tg.showAlert("⚠️ Помилка GPS!"); return; }
            navigator.geolocation.getCurrentPosition(function(position) {
                const dist = getDistance(position.coords.latitude, position.coords.longitude, pointLat, pointLng);
                if (parseFloat(dist) > 2.0) {
                    // Використовуємо tg.showAlert для відображення повідомлення з кнопкою, яка відповідає мові
                    tg.showAlert(t("too_far").replace("{dist}", dist));
                    return;
                }
                // Твоя логіка відправки, якщо все добре
                fetch(`${API_URL}/update`, { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({id, status}) }).then(() => { if(tg) tg.sendData(status + "_" + id); });
            });
        }
        
        // ... (Решта твоїх функцій loadStats, loadTopPermanent тощо залишаються без змін)
    </script>
</body>
</html>
