<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Austria Map</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
html, body { margin:0; padding:0; height:100%; }
#map { height:100vh; width:100vw; }
.btn { width: 100%; padding:10px; margin-top:5px; border:none; border-radius:6px; color:#fff; font-weight:bold; cursor:pointer; }
.leaflet-popup-content { text-align:center; color:#000 !important; }

/* Готова відкрита таблиця ТОП-5 на мапі */
.top-permanent-box {
position: absolute;
top: 10px;
left: 10px;
z-index: 9999;
background: rgba(255, 255, 255, 0.95);
width: 240px;
border-radius: 8px;
box-shadow: 0 4px 12px rgba(0,0,0,.3);
padding: 12px;
font-family: Arial, sans-serif;
border: 1px solid #ddd;
}
.top-permanent-box h3 { 
margin: 0 0 8px 0; 
font-size: 14px; 
text-align: center; 
color: #222; 
border-bottom: 2px solid #136AEC;
padding-bottom: 4px;
}
.top-item { 
display: flex; 
justify-content: space-between; 
padding: 5px 0; 
border-bottom: 1px solid #eee; 
font-size: 13px; 
}
.top-item:last-child { border: none; }

.langBox {
position:absolute;
top:10px;
right:10px;
z-index:9999;
background:white;
padding:5px;
border-radius:6px;
box-shadow:0 2px 6px rgba(0,0,0,.3);
}

/* Адаптивність для малих екранів смартфонів */
@media (max-width: 400px) {
  .top-permanent-box {
    width: 190px;
    padding: 8px;
    font-size: 11px;
  }
  .top-permanent-box h3 { font-size: 12px; }
  .top-item { font-size: 11px; padding: 3px 0; }
}
</style>
</head>
<body>

<div id="map"></div>

<div class="top-permanent-box">
    <h3 id="topTitle">🏆 ТОП-5 активних водіїв</h3>
    <div id="topList">Завантаження рейтингу...</div>
</div>

<div class="langBox">
<select id="langSelect">
<option value="uk">🇺🇦</option>
<option value="pl">🇵🇱</option>
<option value="sk">🇸🇰</option>
<option value="en">🇬🇧</option>
<option value="be">🇧🇾</option>
</select>
</div>

<script>
const tg = window.Telegram ? window.Telegram.WebApp : null;
if (tg) {
    tg.ready();
    tg.expand();
}

const API_URL = "https://austria-map.onrender.com";

// Визначення мови
let lang = localStorage.getItem("lang");
if(!lang){
  const tgLang = tg?.initDataUnsafe?.user?.language_code;
  if(tgLang){
    if(tgLang.startsWith("pl")) lang="pl";
    else if(tgLang.startsWith("sk")) lang="sk";
    else if(tgLang.startsWith("be")) lang="be";
    else if(tgLang.startsWith("uk")) lang="uk";
    else lang="en";
  }else{
    lang="uk";
  }
}
document.getElementById("langSelect").value = lang;
document.getElementById("langSelect").addEventListener("change",(e)=>{
  lang = e.target.value;
  localStorage.setItem("lang",lang);
  loadStats();
});

const i18n = {
  uk:{ clean:"ЧИСТО", control:"КОНТРОЛЬ", total:"Всього" },
  pl:{ clean:"CZYSTO", control:"KONTROLA", total:"Razem" },
  sk:{ clean:"ČISTÉ", control:"KONTROLA", total:"Spolu" },
  en:{ clean:"CLEAR", control:"CONTROL", total:"Total" },
  be:{ clean:"ЧЫСТА", control:"КАНТРОЛЬ", total:"Усяго" }
};
function t(k){ return i18n[lang][k]; }

const dots = [
{"id":1,"n":"Hörbranz A14","lt":47.5446,"ln":9.7407},
{"id":2,"n":"Nuziders A14","lt":47.1731,"ln":9.7737},
{"id":3,"n":"Rabfeld A12","lt":47.4574,"ln":11.9196},
{"id":4,"n":"Kundl A12","lt":47.4734,"ln":11.9693},
{"id":5,"n":"Wels A8","lt":48.1790,"ln":13.8623},
{"id":6,"n":"Wolfsbach A1 (1)","lt":48.1120,"ln":14.6761},
{"id":7,"n":"Wolfsbach A1 (2)","lt":48.1123,"ln":14.6786},
{"id":8,"n":"Mistelbach A5","lt":48.5389,"ln":16.6259},
{"id":9,"n":"Bruck an der Leitha A4","lt":48.0431,"ln":16.7791},
{"id":10,"n":"Pernau A2","lt":47.0900,"ln":15.8511},
{"id":11,"n":"Strass in Steiermark A9","lt":46.7317,"ln":15.6436},
{"id":12,"n":"Hainburg A2","lt":46.6845,"ln":14.6591},
{"id":13,"n":"Arnoldstein A2","lt":46.5410114,"ln":13.6711268},
{"id":14,"n":"Grassbrunn A99","lt":48.0894396,"ln":11.7446506},
{"id":15,"n":"Eberstalzell A1","lt":48.038939,"ln":13.988940},
{"id":16,"n":"Toplitsch/Sud A10","lt":46.654471,"ln":13.739964},
{"id":17,"n":"Kuchl A10","lt":47.649664,"ln":13.136348},
{"id":18,"n":"San Vittore A13","lt":46.2313847,"ln":9.1017162},
{"id":19,"n":"Holztraume A13","lt":46.7635930,"ln":9.4191040},
{"id":20,"n":"Erstfeld A2","lt":46.8369363,"ln":8.6352301,"fix":true},
{"id":21,"n":"Giornoco A2","lt":46.3882186,"ln":8.8929391,"fix":true}
];

let map = L.map("map").setView([47.5162, 14.5501], 7);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:'&copy; OpenStreetMap'}).addTo(map);

let markers = {}, stats = {};

function createPopup(dot, redP, greenP, total){
if(dot.fix) return `<b>${dot.n}</b><br><span style="color:red;font-weight:bold;">КОНТРОЛЬ</span>`;
return `
<b>${dot.n}</b><br>
<span style="display:inline-block;width:16px;height:16px;background:red;border-radius:50%;"></span> ${redP}% |
<span style="display:inline-block;width:16px;height:16px;background:green;border-radius:50%;"></span> ${greenP}%<br>
<small>${t("total")}: ${total}</small><br>
<button class="btn" style="background:green" onclick="sendVote(${dot.id},'green')">${t("clean")}</button>
<button class="btn" style="background:red" onclick="sendVote(${dot.id},'red')">${t("control")}</button>
`;
}

async function loadStats(){
try{
const res = await fetch(`${API_URL}/stats`);
stats = await res.json();
}catch{ stats = {}; }

dots.forEach(dot=>{
const s = stats[dot.id] || {green:0,red:0};
const total = s.green + s.red;
const redP = total ? Math.round((s.red/total)*100) : 0;
const greenP = total ? 100-redP : 0;

let color="blue";
if(dot.fix){
  color="red";
} else if(total>0){
  if(s.red>s.green) color="red";
  else if(s.green>s.red) color="green";
  else color="gold";
}

const iconUrl=`https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-${color}.png`;

if(!markers[dot.id]){
markers[dot.id]=L.marker([dot.lt,dot.ln],{
icon:new L.Icon({
iconUrl:iconUrl,
shadowUrl:'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/images/marker-shadow.png',
iconSize:[25,41],iconAnchor:[12,41],popupAnchor:[1,-34],shadowSize:[41,41]
})
}).addTo(map).bindPopup(createPopup(dot,redP,greenP,total));

L.circle([dot.lt,dot.ln],{radius:1500,color:"blue",weight:1,fillOpacity:0.1}).addTo(map);

}else{
markers[dot.id].setIcon(new L.Icon({
iconUrl:iconUrl,
shadowUrl:'https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/images/marker-shadow.png',
iconSize:[25,41],iconAnchor:[12,41],popupAnchor:[1,-34],shadowSize:[41,41]
}));
markers[dot.id].setPopupContent(createPopup(dot,redP,greenP,total));
}
});
}

function sendVote(id, status) {
    let userId = 0;
    let username = "";
    let firstName = "Водій";

    if (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) {
        userId = tg.initDataUnsafe.user.id || 0;
        username = tg.initDataUnsafe.user.username || "";
        firstName = tg.initDataUnsafe.user.first_name || "Водій";
    }

    fetch(`${API_URL}/update`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            id: id,
            status: status,
            user_id: userId,
            username: username,
            first_name: firstName
        })
    })
    .then(res => res.json())
    .then(data => {
        if (tg) {
            try { tg.sendData(status + "_" + id); } catch(e){}
        }
        loadStats();
        loadTopPermanent(); // Оновлюємо віджет після голосу
    })
    .catch(err => console.error("Помилка відправки:", err));
}

// --- ЗАВАНТАЖЕННЯ ТОП-5 НАПРЯМУ В БЛОК ---
async function loadTopPermanent() {
    const listDiv = document.getElementById("topList");
    try {
        const res = await fetch(`${API_URL}/top?period=week`);
        const topUsers = await res.json();
        
        if (!topUsers || topUsers.length === 0) {
            listDiv.innerHTML = "<p style='text-align:center;margin:5px 0;color:#777;font-size:12px;'>Голосів ще немає 🚀</p>";
            return;
        }
        
        let html = "";
        const medals = ["🥇", "🥈", "🥉"];
        
        // Беремо максимум 5 людей для компактності на мапі
        const top5 = topUsers.slice(0, 5);
        
        top5.forEach((user, i) => {
            const place = i < 3 ? medals[i] : `${i + 1}.`;
            const name = user.first_name || "Водій";
            html += `
                <div class="top-item">
                    <span>${place} <b>${name}</b></span>
                    <span style="color:#136AEC;font-weight:bold;">${user.votes} 🗳️</span>
                </div>
            `;
        });
        listDiv.innerHTML = html;
    } catch (e) {
        listDiv.innerHTML = "<p style='color:red;font-size:12px;'>Помилка рейтингу</p>";
    }
}

// Початкове завантаження даних
loadStats();
loadTopPermanent();

// Оновлення кожні 10 секунд для топу і 2 секунди для мапи
setInterval(loadStats, 2000);
setInterval(loadTopPermanent, 10000);

// Геопозиція
let myDot=null, myAccuracy=null;
function setMyLocation(lat, lon, acc=200){
  if(myDot){
    myDot.setLatLng([lat,lon]);
    myAccuracy.setLatLng([lat,lon]);
    myAccuracy.setRadius(acc);
  } else {
    myAccuracy = L.circle([lat,lon],{
      radius: acc,
      color: "#136AEC",
      fillColor: "#136AEC",
      fillOpacity: 0.15,
      weight: 1
    }).addTo(map);

    myDot = L.circleMarker([lat,lon],{
      radius:7,
      fillColor:"#136AEC",
      color:"#fff",
      weight:2,
      opacity:1,
      fillOpacity:1
    }).addTo(map);

    map.setView([lat,lon],9);
  }
}

if(navigator.geolocation){
  navigator.geolocation.watchPosition(pos=>{
    setMyLocation(pos.coords.latitude, pos.coords.longitude, pos.coords.accuracy);
  }, err=>{ console.log("Помилка геолокації:", err); }, { enableHighAccuracy:true });
}
</script>

</body>
</html>
