<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Austria Map</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
html, body { margin:0; padding:0; height:100%; }
#map { height:100vh; width:100vw; }
.btn { width: 100%; padding:10px; margin-top:5px; border:none; border-radius:6px; color:#fff; font-weight:bold; cursor:pointer; }
.leaflet-popup-content { text-align:center; color:#000 !important; }
.top-permanent-box { position: absolute; top: 10px; left: 10px; z-index: 9999; background: rgba(255, 255, 255, 0.95); width: 240px; border-radius: 8px; box-shadow: 0 4px 12px rgba(0,0,0,.3); padding: 12px; font-family: Arial, sans-serif; border: 1px solid #ddd; }
.top-permanent-box h3 { margin: 0 0 8px 0; font-size: 14px; text-align: center; color: #222; border-bottom: 2px solid #136AEC; padding-bottom: 4px; }
.top-item { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #eee; font-size: 13px; }
.top-item:last-child { border: none; }
.right-controls { position: absolute; top: 10px; right: 10px; z-index: 9999; display: flex; flex-direction: column; align-items: center; gap: 8px; }
.feedback-btn, .donate-btn, .theme-btn { background: #ff9800; color: white; border: none; width: 36px; height: 36px; border-radius: 6px; font-size: 18px; cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,.3); display: flex; align-items: center; justify-content: center; }
.donate-btn { background: #4caf50; }
.theme-btn { background: #673ab7; }
.langBox { background: white; padding: 5px; border-radius: 6px; box-shadow: 0 2px 6px rgba(0,0,0,.3); height: 24px; display: flex; align-items: center; width: 36px; justify-content: center; }
.langBox select { border: none; outline: none; background: transparent; font-size: 16px; cursor: pointer; }
.map-controls { position: fixed; bottom: 80px; left: 0; width: 100%; z-index: 9999; display: flex; justify-content: center; gap: 15px; padding: 10px; box-sizing: border-box; }
.ctrl-btn { background: #ffffff; border: none; width: 50px; height: 50px; border-radius: 50%; font-size: 22px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); cursor: pointer; display: flex; align-items: center; justify-content: center; }
/* Нові стилі модалки */
.modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 20000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
.modal-box { background: rgba(255, 255, 255, 0.9); padding: 20px; border-radius: 20px; width: 85%; max-width: 320px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); text-align: center; font-family: Arial, sans-serif; }
.btn-submit { width: 100%; padding: 12px; border: none; border-radius: 12px; background: #ff9800; color: white; font-weight: bold; cursor: pointer; margin-top: 15px; }
.btn-cancel { background: #eee; color: #333; padding: 10px 20px; border-radius: 12px; border: none; cursor: pointer; }
body.dark-theme .modal-box { background: rgba(40, 40, 40, 0.9); color: #fff; }
</style>
</head>
<body>

<div id="map"></div>

<div class="top-permanent-box">
    <h3 id="topTitle">🏆 ТОП-5 active drivers</h3>
    <div id="topList">Завантаження рейтингу...</div>
</div>

<div class="right-controls">
    <div class="langBox">
        <select id="langSelect">
            <option value="uk">🇺🇦</option>
            <option value="pl">🇵🇱</option>
            <option value="sk">🇸🇰</option>
            <option value="en">🇬🇧</option>
            <option value="be">🇧🇾</option>
        </select>
    </div>
    <button class="feedback-btn" onclick="openFeedbackModal()">💡</button>
    <button class="donate-btn" onclick="showDonateModal()">☕️</button>
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">🌙</button>
</div>

<div class="map-controls">
    <button class="ctrl-btn" onclick="map.zoomOut()">➖</button>
    <button class="ctrl-btn" onclick="locateUser(true)">🎯</button>
    <button class="ctrl-btn" onclick="map.zoomIn()">➕</button>
</div>

<div style="position: fixed; bottom: 0; left: 0; width: 100%; z-index: 9999; padding: 10px; box-sizing: border-box; background: rgba(255,255,255,0.1);">
    <button onclick="sendTrafficBan()" style="width: 100%; padding: 15px; border: none; border-radius: 8px; background: #b71c1c; color: white; font-weight: bold; font-size: 16px; cursor: pointer;">TRAFFICBAN</button>
</div>

<div class="modal-overlay" id="msgModal">
    <div class="modal-box">
        <h3 id="msgContent"></h3>
        <button class="btn-submit" id="msgBtn" onclick="closeMsgModal()">Гаразд</button>
    </div>
</div>

<div class="modal-overlay" id="feedbackModal">
    <div class="modal-box">
        <h3 id="modalTitle">Зв'язатися з підтримкою</h3>
        <textarea id="feedbackText" style="width:100%; height:80px; margin:10px 0; padding:10px; border-radius:8px; border:1px solid #ccc;"></textarea>
        <div style="display:flex; gap:10px; justify-content:center;">
            <button class="btn-cancel" id="btnFeedbackCancel" onclick="closeFeedbackModal()">Скасувати</button>
            <button class="btn-submit" style="margin-top:0;" id="btnFeedbackSubmit" onclick="submitFeedback()">Надіслати</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="donateModal">
    <div class="modal-box">
        <h3 id="donateTitle">Дякуємо за підтримку! ☕️</h3>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0;">
            <button onclick="window.open('https://revolut.me/vsachenko?currency=EUR&amount=100', '_blank')" class="btn-submit" style="margin:0;">1 €</button>
            <button onclick="window.open('https://revolut.me/vsachenko?currency=EUR&amount=300', '_blank')" class="btn-submit" style="margin:0;">3 €</button>
        </div>
        <button id="btnDonateClose" class="btn-cancel" onclick="closeDonateModal()" style="width:100%;">Закрити</button>
    </div>
</div>

<script>
const tg = window.Telegram ? window.Telegram.WebApp : null;
if (tg) { tg.ready(); tg.expand(); }
const API_URL = "https://austria-map.onrender.com";

let lang = localStorage.getItem("lang") || "uk";
document.getElementById("langSelect").value = lang;
document.getElementById("langSelect").addEventListener("change",(e)=>{ lang = e.target.value; localStorage.setItem("lang",lang); updateLabels(); loadStats(); });

const i18n = {
 uk:{ clean:"ЧИСТО", control:"КОНТРОЛЬ", ok:"Гаразд", too_far:"Ви занадто далеко ({dist} км). Радіус 2 км!", gps_err:"Помилка GPS", gps_off:"Увімкніть GPS"},
 pl:{ clean:"CZYSTO", control:"KONTROLA", ok:"Dobrze", too_far:"Jesteś za daleko ({dist} km). Zasięg 2 km!", gps_err:"Błąd GPS", gps_off:"Włącz GPS"},
 sk:{ clean:"ČISTÉ", control:"KONTROLA", ok:"Dobre", too_far:"Ste príliš ďaleko ({dist} km). Dosah 2 km!", gps_err:"Chyba GPS", gps_off:"Zapnite GPS"},
 en:{ clean:"CLEAR", control:"CONTROL", ok:"OK", too_far:"You are too far ({dist} km). Range 2 km!", gps_err:"GPS Error", gps_off:"Turn on GPS"},
 be:{ clean:"ЧЫСТА", control:"КАНТРОЛЬ", ok:"Добра", too_far:"Вы занадта далёка ({dist} км). Радыус 2 км!", gps_err:"Памылка GPS", gps_off:"Уключыце GPS"}
};
function t(k){ return i18n[lang][k]; }

function showMsg(text) { document.getElementById("msgContent").innerText = text; document.getElementById("msgBtn").innerText = t("ok"); document.getElementById("msgModal").style.display = "flex"; }
function closeMsgModal() { document.getElementById("msgModal").style.display = "none"; }

function getDistance(lat1, lon1, lat2, lon2) {
    const R = 6371;
    const dLat = (lat2-lat1)*Math.PI/180;
    const dLon = (lon2-lon1)*Math.PI/180;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
    return (R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))).toFixed(1);
}

function sendVote(id, status, pointLat, pointLng) {
    if (!navigator.geolocation) { showMsg(t("gps_err")); return; }
    navigator.geolocation.getCurrentPosition(pos => {
        const dist = getDistance(pos.coords.latitude, pos.coords.longitude, pointLat, pointLng);
        if (dist > 2.0) { showMsg(t("too_far").replace("{dist}", dist)); return; }
        fetch(`${API_URL}/update`, { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({id, status, user_id: tg?.initDataUnsafe?.user?.id || 0, first_name: tg?.initDataUnsafe?.user?.first_name || "Водій", user_lat: pos.coords.latitude, user_lng: pos.coords.longitude, point_lat: pointLat, point_lng: pointLng}) }).then(() => { if(tg) tg.sendData(status + "_" + id); loadStats(); });
    }, () => showMsg(t("gps_off")), { enableHighAccuracy: true });
}

function updateLabels() { /* додай тут оновлення тексту для інших кнопок, якщо треба */ }
function openFeedbackModal() { document.getElementById("feedbackModal").style.display = "flex"; }
function closeFeedbackModal() { document.getElementById("feedbackModal").style.display = "none"; }
function showDonateModal() { document.getElementById("donateModal").style.display = "flex"; }
function closeDonateModal() { document.getElementById("donateModal").style.display = "none"; }
function sendTrafficBan() { window.open("https://trafficban.com", '_blank'); }

// Ініціалізація
loadStats = async () => { /* твоя функція завантаження статистики */ };
loadTopPermanent = async () => { /* твоя функція топу */ };
locateUser = (center) => { /* твоя функція геолокації */ };
loadStats(); loadTopPermanent(); locateUser(false);
</script>
</body>
</html>
