<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Austria Map</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        html, body { margin:0; padding:0; height:100%; }
        #map { height:100vh; width:100vw; }
        .btn { width:100%; padding:10px; margin-top:5px; border:none; border-radius:6px; color:#fff; font-weight:bold; cursor:pointer; }
        .top-permanent-box { position:absolute; top:10px; left:10px; z-index:9999; background:rgba(255, 255, 255, 0.95); width:240px; border-radius:8px; box-shadow:0 4px 12px rgba(0,0,0,.3); padding:12px; font-family:Arial, sans-serif; border:1px solid #ddd; }
        .right-controls { position:absolute; top:10px; right:10px; z-index:9999; display:flex; flex-direction:column; align-items:center; gap:8px; }
        .feedback-btn, .donate-btn { background:#ff9800; color:white; border:none; width:36px; height:36px; border-radius:6px; cursor:pointer; }
        .modal-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:10000; display:none; align-items:center; justify-content:center; }
        .modal-box { background:white; padding:20px; border-radius:12px; width:85%; max-width:320px; }
        .modal-box textarea { width:100%; height:90px; border:1px solid #ccc; padding:8px; box-sizing:border-box; }
        .modal-actions { display:flex; justify-content:flex-end; gap:10px; margin-top:10px; }
        .btn-submit { background:#ff9800; color:white; border:none; padding:8px 14px; border-radius:6px; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div class="top-permanent-box">
        <h3 id="topTitle">🏆 ТОП-5 active drivers</h3>
        <div id="topList">Завантаження...</div>
    </div>
    <div class="right-controls">
        <button class="feedback-btn" onclick="openFeedbackModal()">💡</button>
        <button class="donate-btn" onclick="showDonateModal()">☕️</button>
    </div>
    <div class="modal-overlay" id="feedbackModal">
        <div class="modal-box">
            <h3 id="modalTitle">Зв'язатися з підтримкою</h3>
            <textarea id="feedbackText" placeholder="Опишіть проблему..."></textarea>
            <div class="modal-actions">
                <button onclick="closeFeedbackModal()">Скасувати</button>
                <button class="btn-submit" onclick="submitFeedback()">Надіслати</button>
            </div>
        </div>
    </div>
    <script>
        const tg = window.Telegram ? window.Telegram.WebApp : null;
        if (tg) { tg.ready(); tg.expand(); }
        const API_URL = "https://austria-map.onrender.com";
        
        function openFeedbackModal() { document.getElementById("feedbackModal").style.display = "flex"; }
        function closeFeedbackModal() { document.getElementById("feedbackModal").style.display = "none"; }
        
        function submitFeedback() {
            const text = document.getElementById("feedbackText").value.trim();
            if (!text) return alert("Введіть текст!");
            
            fetch(`${API_URL}/feedback`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    text: text,
                    user_id: tg?.initDataUnsafe?.user?.id || 0,
                    username: tg?.initDataUnsafe?.user?.username || "",
                    first_name: tg?.initDataUnsafe?.user?.first_name || "Водій"
                })
            })
            .then(res => res.json())
            .then(data => { alert("Надіслано!"); document.getElementById("feedbackText").value = ""; closeFeedbackModal(); })
            .catch(err => alert("Помилка!"));
        }
    </script>
</body>
</html>
