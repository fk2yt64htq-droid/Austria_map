<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Austria Map</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
html, body { margin:0; padding:0; height:100%; overflow:hidden; font-family:Arial; }
#map { height: calc(100vh - 60px); width:100vw; }

.bottom-bar { position:fixed; bottom:0; width:100%; height:60px; background:#fff; display:flex; align-items:center; justify-content:center; z-index:9999; border-top:1px solid #ddd; }
.trafficban-btn { width:95%; height:45px; background:#d32f2f; color:#fff; border:none; border-radius:8px; font-weight:bold; }

.top-permanent-box { position:absolute; top:10px; left:10px; z-index:9999; background:#fff; padding:12px; border-radius:8px; width:240px; }

.right-controls { position:absolute; top:10px; right:10px; z-index:9999; display:flex; flex-direction:column; gap:8px; }

.feedback-btn, .donate-btn { width:36px; height:36px; border:none; border-radius:6px; cursor:pointer; }

.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); align-items:center; justify-content:center; z-index:10000; }
.modal-box { background:#fff; padding:20px; border-radius:12px; width:85%; max-width:320px; }
textarea { width:100%; height:90px; }
</style>
</head>

<body>

<div id="map"></div>

<div class="bottom-bar">
    <button class="trafficban-btn" onclick="window.open('https://trafficban.com','_blank')">TRAFFICBAN</button>
</div>

<div class="top-permanent-box">
    <h3>🏆 ТОП</h3>
    <div id="topList">Loading...</div>
</div>

<div class="right-controls">
    <button class="feedback-btn" onclick="openFeedback()">💡</button>
    <button class="donate-btn" onclick="alert('Donate')">☕</button>
</div>

<div class="modal-overlay" id="feedbackModal">
    <div class="modal-box">
        <h3>Зворотній зв’язок</h3>
        <textarea id="feedbackText"></textarea>
        <button onclick="sendFeedback()">Надіслати</button>
        <button onclick="closeFeedback()">Закрити</button>
    </div>
</div>

<script>
const API_URL = "https://austria-map.onrender.com";
const tg = window.Telegram?.WebApp;

function openFeedback(){
    document.getElementById("feedbackModal").style.display="flex";
}

function closeFeedback(){
    document.getElementById("feedbackModal").style.display="none";
}

/* 💡 ГОЛОВНЕ ВИПРАВЛЕННЯ */
async function sendFeedback(){

    const text = document.getElementById("feedbackText").value.trim();
    if(!text) return alert("Порожньо");

    let user = tg?.initDataUnsafe?.user || {};

    try{
        const res = await fetch(API_URL+"/feedback",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({
                user_id:user.id||0,
                username:user.username||"",
                first_name:user.first_name||"Driver",
                text:text
            })
        });

        const data = await res.json();

        if(data.status==="success"){
            alert("Надіслано");
            document.getElementById("feedbackText").value="";
            closeFeedback();
        }else{
            alert("Помилка");
        }

    }catch(e){
        alert("Server error");
    }
}
</script>

</body>
</html>
