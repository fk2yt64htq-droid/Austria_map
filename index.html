<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Austria Map</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
html, body { margin:0; padding:0; height:100%; }
#map { height:100vh; width:100vw; }
.btn { width: 100%; padding:10px; margin-top:5px; border:none; border-radius:6px; color:#fff; font-weight:bold; cursor:pointer; }
.leaflet-popup-content { text-align:center; color:#000 !important; }
.top-permanent-box { position: absolute; top: 10px; left: 10px; z-index: 9999; background: rgba(255, 255, 255, 0.95); width: 240px; border-radius: 8px; box-shadow: 0 4px 12px rgba(0,0,0,.3); padding: 12px; font-family: Arial, sans-serif; border: 1px solid #ddd; }
.top-permanent-box h3 { margin: 0 0 8px 0; font-size: 14px; text-align: center; color: #222; border-bottom: 2px solid #136AEC; padding-bottom: 4px; }
.top-item { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #eee; font-size: 13px; }
.right-controls { position: absolute; top: 10px; right: 10px; z-index: 9999; display: flex; flex-direction: column; align-items: center; gap: 8px; }
.feedback-btn, .donate-btn, .theme-btn { background: #ff9800; color: white; border: none; width: 36px; height: 36px; border-radius: 6px; font-size: 18px; cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,.3); display: flex; align-items: center; justify-content: center; }
.donate-btn { background: #4caf50; }
.theme-btn { background: #673ab7; }
.langBox { background: white; padding: 5px; border-radius: 6px; box-shadow: 0 2px 6px rgba(0,0,0,.3); height: 24px; display: flex; align-items: center; width: 36px; justify-content: center; }
.langBox select { border: none; outline: none; background: transparent; font-size: 16px; cursor: pointer; }
.map-controls { position: fixed; bottom: 80px; left: 0; width: 100%; z-index: 9999; display: flex; justify-content: center; gap: 15px; padding: 10px; box-sizing: border-box; }
.ctrl-btn { background: #ffffff; border: none; width: 50px; height: 50px; border-radius: 50%; font-size: 22px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); cursor: pointer; display: flex; align-items: center; justify-content: center; }
.modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 10000; display: none; align-items: center; justify-content: center; }
.modal-box { background: white; padding: 20px; border-radius: 12px; width: 85%; max-width: 320px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
body.dark-theme .top-permanent-box, body.dark-theme .modal-box, body.dark-theme .ctrl-btn { background: #222; color: #fff; }
</style>
</head>
<body>
<div id="map"></div>
<div class="top-permanent-box">
    <h3 id="topTitle">🏆 ТОП-5 active drivers</h3>
    <div id="topList">Завантаження...</div>
</div>
<div class="right-controls">
    <div class="langBox">
        <select id="langSelect"><option value="uk">🇺🇦</option><option value="pl">🇵🇱</option><option value="sk">🇸🇰</option><option value="en">🇬🇧</option><option value="be">🇧🇾</option></select>
    </div>
    <button class="feedback-btn" onclick="openFeedbackModal()">💡</button>
    <button class="donate-btn" onclick="showDonateModal()">☕️</button>
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">🌙</button>
</div>
<div class="map-controls">
    <button class="ctrl-btn" onclick="map.zoomOut()">➖</button>
    <button class="ctrl-btn" onclick="locateUser(true)">🎯</button>
    <button class="ctrl-btn" onclick="map.zoomIn()">➕</button>
</div>
<div style="position: fixed; bottom: 0; left: 0; width: 100%; z-index: 9999; padding: 10px; box-sizing: border-box;">
    <button onclick="sendTrafficBan()" style="width: 100%; padding: 15px; border: none; border-radius: 8px; background: #b71c1c; color: white; font-weight: bold; cursor: pointer;">TRAFFICBAN</button>
</div>

<script>
const tg = window.Telegram ? window.Telegram.WebApp : null;
if (tg) { tg.ready(); tg.expand(); }
const API_URL = "https://austria-map.onrender.com";
let lang = localStorage.getItem("lang") || "uk";
document.getElementById("langSelect").value = lang;

const i18n = {
 uk: { clean:"ЧИСТО", control:"КОНТРОЛЬ", total:"Всього", was_control:"Був КОНТРОЛЬ", was_clean:"Було ЧИСТО", active: "Активно:", top_title: "🏆 ТОП-5 active drivers", err_too_far: "Ви занадто далеко. Радіус дії 2 км!", err_generic: "Помилка!" },
 pl: { clean:"CZYSTO", control:"KONTROLA", total:"Razem", was_control:"Była KONTROLA", was_clean:"Było CZYSTO", active: "Aktywne:", top_title: "🏆 TOP-5 active drivers", err_too_far: "Jesteś za daleko. Zasięg wynosi 2 km!", err_generic: "Błąd!" },
 sk: { clean:"ČISTÉ", control:"KONTROLA", total:"Spolu", was_control:"Bola KONTROLA", was_clean:"Bolo ČISTÉ", active: "Aktívne:", top_title: "🏆 TOP-5 active drivers", err_too_far: "Ste príliš ďaleko. Dosah je 2 km!", err_generic: "Chyba!" },
 en: { clean:"CLEAR", control:"CONTROL", total:"Total", was_control:"Was CONTROL", was_clean:"Was CLEAR", active: "Active:", top_title: "🏆 TOP-5 active drivers", err_too_far: "You are too far. The range is 2 km!", err_generic: "Error!" },
 be: { clean:"ЧЫСТА", control:"КАНТРОЛЬ", total:"Усяго", was_control:"Быў КАНТРОЛЬ", was_clean:"Было ЧЫСТА", active: "Актыўна:", top_title: "🏆 ТОП-5 active drivers", err_too_far: "Вы занадта далёка. Радыус дзеяння 2 км!", err_generic: "Памылка!" }
};

function t(k) { return i18n[lang] && i18n[lang][k] ? i18n[lang][k] : k; }
document.getElementById("langSelect").addEventListener("change", (e) => { lang = e.target.value; localStorage.setItem("lang", lang); location.reload(); });

const dots = [{"id":1,"n":"Hörbranz A14","lt":47.5446,"ln":9.7407},{"id":2,"n":"Nuziders A14","lt":47.1731,"ln":9.7737},{"id":3,"n":"Rabfeld A12","lt":47.4574,"ln":11.9196},{"id":4,"n":"Kundl A12","lt":47.4734,"ln":11.9693},{"id":5,"n":"Wels A8","lt":48.1790,"ln":13.8623},{"id":6,"n":"Wolfsbach A1 (1)","lt":48.1120,"ln":14.6761},{"id":7,"n":"Wolfsbach A1 (2)","lt":48.1123,"ln":14.6786},{"id":8,"n":"Mistelbach A5","lt":48.5389,"ln":16.6259},{"id":9,"n":"Bruck an der Keitha A4","lt":48.0431,"ln":16.7791},{"id":10,"n":"Pernau A2","lt":47.0900,"ln":15.8511},{"id":11,"n":"Strass in Steiermark A9","lt":46.7317,"ln":15.6436},{"id":12,"n":"Hainburg A2","lt":46.6845,"ln":14.6591},{"id":13,"n":"Arnoldstein A2","lt":46.5410114,"ln":13.6711268},{"id":14,"n":"Grassbrunn A99","lt":48.0894396,"ln":11.7446506},{"id":15,"n":"Eberstalzell A1","lt":48.038939,"ln":13.988940},{"id":16,"n":"Toplitsch/Sud A10","lt":46.654471,"ln":13.739964},{"id":17,"n":"Kuchl A10","lt":47.649664,"ln":13.136348},{"id":18,"n":"San Vittore A13","lt":46.2313847,"ln":9.1017162},{"id":19,"n":"Holztraume A13","lt":46.7635930,"ln":9.4191040},{"id":20,"n":"Erstfeld A2","lt":46.8369363,"ln":8.6352301,"fix":true},{"id":21,"n":"Giornoco A2","lt":46.3882186,"ln":8.8929391,"fix":true}];

let map = L.map("map", {zoomControl: false}).setView([47.5162, 14.5501], 7);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {attribution: '&copy; OpenStreetMap'}).addTo(map);

function sendVote(id, status, pointLat, pointLng) {
    if (!navigator.geolocation) return;
    navigator.geolocation.getCurrentPosition(pos => {
        fetch(`${API_URL}/update`, { 
            method: "POST", 
            headers: { "Content-Type": "application/json" }, 
            body: JSON.stringify({ id, status, user_id: tg?.initDataUnsafe?.user?.id || 0, user_lat: pos.coords.latitude, user_lng: pos.coords.longitude }) 
        })
        .then(async res => {
            if (res.status === 200) { if (tg) tg.sendData(status + "_" + id); }
            else { 
                const d = await res.json();
                // Тут ловимо помилку з сервера. Якщо це "too_far" - показуємо наш переклад
                if (d.message && d.message.includes("2 км")) alert(t("err_too_far"));
                else alert(t("err_generic"));
            }
        });
    });
}
function sendTrafficBan() { window.open("https://trafficban.com", '_blank'); }
</script>
</body>
</html>
